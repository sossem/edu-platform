<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- PWA & Mobile Optimization -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1e293b">
<title>해빛초 AI 스마트 실습</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>
<style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { 
        font-family: 'Pretendard', sans-serif; 
        background-color: #f8fafc; 
        color: #334155;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        overflow-x: hidden;
    }
    
    .fade-in { animation: fadeIn 0.4s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .pulse-alert { animation: pulseBorder 2s infinite; }
    @keyframes pulseBorder {
        0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
        70% { box-shadow: 0 0 0 8px rgba(245, 158, 11, 0); }
        100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
    }

    .glass-header {
        background: rgba(30, 41, 59, 0.95);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 400px; }
    .toast { padding: 16px; border-radius: 12px; font-weight: bold; color: white; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: slideDown 0.3s ease-out forwards; opacity: 0; }
    @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .toast.success { background-color: #10b981; }
    .toast.error { background-color: #ef4444; }

    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center">

<div id="toast-container"></div>

<!-- ================= [ 1. 로그인 화면 ] ================= -->
<div id="login-screen" class="w-full max-w-md p-6 mt-10 fade-in flex flex-col items-center justify-center min-h-[80vh]">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full border border-slate-100">
        <div class="flex justify-center mb-4">
            <div class="bg-blue-100 p-3 rounded-full">
                <i data-lucide="graduation-cap" class="text-blue-600 w-8 h-8"></i>
            </div>
        </div>
        <h2 class="text-2xl font-bold text-center text-slate-800 mb-2">해빛초 교육실습 플랫폼</h2>
        <p class="text-sm text-center text-slate-500 mb-8">배정받은 학급과 성함을 입력해주세요.</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">학년</label>
                <select id="grade" class="w-full p-3 border border-slate-300 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none transition appearance-none">
                    <option value="1">1학년</option>
                    <option value="2">2학년</option>
                    <option value="3">3학년</option>
                    <option value="4">4학년</option>
                    <option value="5">5학년</option>
                    <option value="6">6학년</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">반</label>
                <select id="classNum" class="w-full p-3 border border-slate-300 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none transition appearance-none">
                    <option value="1">1반</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">이름</label>
                <input type="text" id="userName" placeholder="예: 김민준" class="w-full p-3 border border-slate-300 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-md transition transform active:scale-95 mt-4 flex justify-center items-center gap-2">
                <span>시작하기</span>
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </div>
    </div>
</div>

<!-- ================= [ 2. 메인 대시보드 화면 ] ================= -->
<div id="dashboard-screen" class="w-full max-w-md hidden fade-in pb-10">
    <!-- 상단 프로필 헤더 -->
    <div class="glass-header text-white px-6 py-10 pt-14 rounded-b-3xl shadow-lg relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500 rounded-full mix-blend-multiply filter blur-xl opacity-30"></div>
        <div class="relative z-10 flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold mb-1 flex items-center gap-2">
                    <i data-lucide="sparkles" class="text-yellow-400 w-5 h-5"></i> 해빛 AI 스마트 실습
                </h1>
                <p id="user-profile" class="text-blue-100 text-sm font-medium">🎓 로딩 중...</p>
            </div>
            <button onclick="logout()" class="p-2 bg-slate-700 hover:bg-slate-600 rounded-full transition">
                <i data-lucide="log-out" class="w-5 h-5 text-slate-300"></i>
            </button>
        </div>
    </div>

    <div class="px-5 mt-[-20px] relative z-20">
        <!-- 1. 실시간 이동 안내 카드 -->
        <div id="realtime-alert" class="bg-amber-50 border border-amber-200 rounded-2xl p-5 shadow-sm mb-5 pulse-alert"></div>

        <!-- 2. AI 참관 가이드 -->
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 mb-5">
            <div class="flex items-center justify-between mb-4 pb-3 border-b border-slate-100">
                <h3 id="guide-title" class="font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="brain-circuit" class="text-indigo-500 w-5 h-5"></i> 참관 가이드
                </h3>
                <span id="next-time-badge" class="bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-1 rounded-md">--:--</span>
            </div>
            <p id="next-class-info" class="text-lg font-bold text-slate-800 mb-4">불러오는 중...</p>

            <div class="bg-blue-50/50 border border-blue-100 rounded-xl p-4">
                <p class="text-sm font-bold text-blue-800 mb-2 flex items-center gap-2">
                    <i data-lucide="lightbulb" class="w-4 h-4 text-yellow-500"></i> AI 추천 관전 포인트
                </p>
                <ul id="ai-points" class="text-sm text-slate-600 space-y-2 pl-1">
                    <li class="flex items-start gap-2"><div class="w-1.5 h-1.5 rounded-full bg-blue-400 mt-1.5 flex-shrink-0"></div><span>로딩 중...</span></li>
                </ul>
            </div>
        </div>

        <!-- 3. 핵심 메뉴 퀵 버튼 그리드 -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="showScheduleModal()" class="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm active:bg-slate-50 transition flex flex-col items-center justify-center gap-3 group">
                <div class="bg-teal-50 p-3 rounded-full"><i data-lucide="calendar-days" class="text-teal-600 w-7 h-7"></i></div>
                <span class="text-sm font-bold text-slate-700">나의 시간표</span>
            </button>
            <button onclick="window.open('https://drive.google.com', '_blank')" class="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm active:bg-slate-50 transition flex flex-col items-center justify-center gap-3 group">
                <div class="bg-green-50 p-3 rounded-full"><i data-lucide="folder-open" class="text-green-600 w-7 h-7"></i></div>
                <span class="text-sm font-bold text-slate-700">참고자료</span>
            </button>
            <button onclick="showMapModal()" class="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm active:bg-slate-50 transition flex flex-col items-center justify-center gap-3 group">
                <div class="bg-blue-50 p-3 rounded-full"><i data-lucide="map" class="text-blue-600 w-7 h-7"></i></div>
                <span class="text-sm font-bold text-slate-700">교실배치도</span>
            </button>
            <button onclick="showMeetingModal()" class="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm active:bg-slate-50 transition flex flex-col items-center justify-center gap-3 group">
                <div class="bg-purple-50 p-3 rounded-full"><i data-lucide="message-square-dashed" class="text-purple-600 w-7 h-7"></i></div>
                <span class="text-sm font-bold text-slate-700">수업 협의회</span>
            </button>
        </div>
    </div>
</div>

<!-- ================= [ 모달 영역 ] ================= -->
<div id="schedule-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden z-50 flex items-end justify-center sm:items-center">
    <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl h-[75vh] sm:h-auto sm:max-h-[85vh] flex flex-col transform transition-transform translate-y-full" id="schedule-modal-content">
        <div class="p-5 border-b flex justify-between items-center sticky top-0 bg-white rounded-t-3xl sm:rounded-2xl z-10">
            <h3 class="font-bold text-lg flex items-center gap-2"><i data-lucide="calendar" class="w-5 h-5 text-blue-600"></i> 전체 시간표</h3>
            <button onclick="closeModal('schedule-modal')" class="p-2 bg-slate-100 rounded-full hover:bg-slate-200"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>
        <div class="p-5 overflow-y-auto flex-1 no-scrollbar">
            <div class="relative border-l-2 border-slate-200 ml-3 space-y-6" id="schedule-list"></div>
        </div>
    </div>
</div>

<div id="map-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden z-50 flex items-center justify-center">
    <div class="bg-white w-[92%] max-w-lg rounded-2xl p-5 shadow-xl relative transform transition-transform scale-95 flex flex-col h-[75vh]" id="map-modal-content">
        <button onclick="closeModal('map-modal')" class="absolute top-4 right-4 p-2 bg-slate-100 rounded-full hover:bg-slate-200 z-10"><i data-lucide="x" class="w-4 h-4"></i></button>
        <h3 class="font-bold text-lg mb-4 flex items-center gap-2 flex-shrink-0"><i data-lucide="map" class="w-5 h-5 text-blue-600"></i> 교실배치도 안내</h3>
        
        <div class="w-full flex-1 bg-slate-50 rounded-xl border-2 border-slate-200 overflow-hidden relative flex flex-col">
            <!-- 🌟 이 부분이 수정되었습니다: 임시 이미지 주소 -> ./map.png 및 전체보기를 위한 object-contain 적용 -->
            <img src="./map.png" alt="2026학년도 교실배치도" class="w-full h-full object-contain bg-white">
            
            <div class="absolute bottom-4 left-4 right-4 bg-white/95 backdrop-blur p-4 rounded-xl shadow-lg z-10 text-sm flex justify-between items-center border border-slate-100">
                <div class="flex flex-col">
                    <span class="text-[10px] text-slate-400 font-bold uppercase">Current</span>
                    <span id="map-current-loc" class="font-bold text-slate-700 text-base">📍 대기</span>
                </div>
                <div class="flex-1 h-0.5 bg-slate-200 mx-4 relative"><div class="absolute top-[-3px] left-1/2 w-2 h-2 bg-slate-400 rotate-45 transform -translate-x-1/2"></div></div>
                <div class="flex flex-col items-end">
                    <span class="text-[10px] text-red-400 font-bold uppercase">Next</span>
                    <span id="map-next-loc" class="font-bold text-red-600 text-base">🚩 없음</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();

    // 선생님이 배포하신 구글 앱스 스크립트 주소
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw9dUGNaJj9HJo8kqEHjm6f6RcCjLiMDLMi59ILOTAz4WR9tPxjyB-PlW7nylQiedMr/exec";
    
    let currentScheduleData = [];
    let currentGrade = "";

    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const icon = type === 'success' ? 'check-circle' : 'alert-circle';
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5"></i> <span>${message}</span>`;
        container.appendChild(toast);
        lucide.createIcons();
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
    }

    async function handleLogin() {
        const gradeInput = document.getElementById('grade').value;
        const classNumInput = document.getElementById('classNum').value;
        const inputName = document.getElementById('userName').value;
        
        if (!inputName.trim()) { showToast("이름을 입력해주세요.", "error"); return; }

        const loginBtn = document.querySelector('button[onclick="handleLogin()"]');
        const originalBtnContent = loginBtn.innerHTML;
        loginBtn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i><span>서버 연결 중...</span>`;
        loginBtn.disabled = true;
        lucide.createIcons();

        try {
            const requestUrl = `${GOOGLE_SCRIPT_URL}?grade=${gradeInput}&classNum=${classNumInput}&name=${inputName}&t=${new Date().getTime()}`;
            const response = await fetch(requestUrl);
            const data = await response.json();

            if (data.success) {
                currentGrade = data.grade;
                currentScheduleData = data.schedule; 
                
                localStorage.setItem('eduPlatformUser', JSON.stringify({
                    grade: gradeInput,
                    classNum: classNumInput,
                    name: inputName
                }));
                
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                document.getElementById('user-profile').innerHTML = `<span class="font-bold">${currentGrade}학년 ${data.classNum}반</span> ${data.name} 교생선생님`;

                updateDashboardByTime();
                setInterval(updateDashboardByTime, 60000); 
                showToast("✅ 반갑습니다, 교생선생님!", "success");
            } else {
                showToast(data.message || "등록된 정보가 없습니다.", "error");
                loginBtn.innerHTML = originalBtnContent;
                loginBtn.disabled = false;
                localStorage.removeItem('eduPlatformUser');
            }
        } catch (error) {
            showToast("서버 통신 오류. 스크립트 URL을 확인하세요.", "error");
            loginBtn.innerHTML = originalBtnContent;
            loginBtn.disabled = false;
        }
    }

    function logout() { 
        localStorage.removeItem('eduPlatformUser');
        location.reload(); 
    }

    function checkAutoLogin() {
        const savedUser = localStorage.getItem('eduPlatformUser');
        if (savedUser) {
            try {
                const user = JSON.parse(savedUser);
                document.getElementById('grade').value = user.grade;
                document.getElementById('classNum').value = user.classNum;
                document.getElementById('userName').value = user.name;
                handleLogin(); 
            } catch(e) { console.error("자동 로그인 오류"); }
        }
    }
    
    checkAutoLogin();

    function updateDashboardByTime() {
        const now = new Date();
        const nowMinutes = now.getHours() * 60 + now.getMinutes();
        const currentTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        
        let currentItem = null;
        let nextItem = null;

        for (let item of currentScheduleData) {
            const timeParts = item.time.split(/~|-/);
            const startStr = timeParts[0] ? timeParts[0].trim() : "00:00";
            const endStr = timeParts[1] ? timeParts[1].trim() : "23:59";
            const startMins = parseInt(startStr.split(':')[0]) * 60 + parseInt(startStr.split(':')[1]);
            const endMins = parseInt(endStr.split(':')[0]) * 60 + parseInt(endStr.split(':')[1]);
            
            if (nowMinutes >= startMins && nowMinutes <= endMins) {
                currentItem = item;
            } else if (nowMinutes < startMins && !nextItem) {
                nextItem = item;
            }
        }

        window.currentLocationName = currentItem ? currentItem.loc : "대기";
        window.nextLocationName = nextItem ? nextItem.loc : "없음";

        const alertBox = document.getElementById('realtime-alert');
        
        if (!currentItem && !nextItem) {
            alertBox.innerHTML = `<div class="flex items-center gap-3"><div class="bg-green-100 p-2 rounded-full"><i data-lucide="check-circle" class="text-green-600 w-5 h-5"></i></div><strong class="text-green-800 text-sm">현재 예정된 일정이 없습니다.</strong></div>`;
            document.getElementById('next-class-info').innerText = "일정 없음";
            document.getElementById('next-time-badge').innerText = "--:--";
            return; 
        }

        let targetItem = currentItem || nextItem;
        
        if (targetItem) {
            let nextStart = nextItem ? nextItem.time.split(/~|-/)[0].trim() : "";
            
            alertBox.innerHTML = `
                <div class="flex items-start gap-3">
                    <div class="bg-amber-100 p-2 rounded-full mt-1"><i data-lucide="bell-ring" class="text-amber-600 w-5 h-5"></i></div>
                    <div class="flex-1 w-full">
                        <div class="flex justify-between items-center mb-1.5">
                            <strong class="text-amber-800 text-xs font-bold">실시간 일정 안내</strong>
                            <span class="text-[10px] font-medium text-amber-600 bg-amber-100 px-1.5 py-0.5 rounded">${currentTimeStr} 기준</span>
                        </div>
                        
                        <div class="mb-3">
                            <span class="text-[11px] font-bold text-slate-500 block mb-0.5">▶ 현재 진행</span>
                            <p class="text-lg font-extrabold text-slate-800 tracking-tight leading-snug break-keep">
                                ${currentItem ? currentItem.subject : '대기 중'}
                            </p>
                        </div>

                        <div class="text-sm font-bold text-red-600 bg-red-50 block w-full px-3 py-2 rounded-lg shadow-sm border border-red-100">
                            <span class="text-[11px] text-red-400 font-bold block mb-0.5">[예정] ${nextItem ? nextStart + ' 시작' : ''}</span>
                            <div class="${nextItem ? 'mb-2' : ''}">${nextItem ? nextItem.subject : '다음 일정이 없습니다.'}</div>
                            
                            ${nextItem ? `
                            <div class="mt-2 pt-2 border-t border-red-200/60 flex items-center justify-between cursor-pointer hover:bg-red-100/50 p-1.5 -mx-1.5 rounded transition" onclick="showMapModal()">
                                <div class="flex items-center gap-1.5 text-xs text-slate-700 font-bold">
                                    <span class="truncate max-w-[80px]">📍${currentItem ? currentItem.loc : '대기'}</span>
                                    <i data-lucide="arrow-right" class="w-3 h-3 text-slate-400"></i>
                                    <span class="text-red-600 truncate max-w-[80px]">🚩${nextItem.loc}</span>
                                </div>
                                <div class="flex items-center gap-1 text-[10px] bg-white px-2 py-1 rounded shadow-sm border border-red-200 text-red-600">
                                    <i data-lucide="map" class="w-3 h-3"></i> 배치도
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('guide-title').innerHTML = `<i data-lucide="brain-circuit" class="text-indigo-500 w-5 h-5"></i> ${currentItem ? '현재' : '다음'} 수업 가이드`;
            document.getElementById('next-class-info').innerText = targetItem.subject;
            document.getElementById('next-time-badge').innerText = targetItem.time;
            
            if (window.lastFetchedSubject !== targetItem.subject) {
                fetchAIAnalysis(targetItem);
                window.lastFetchedSubject = targetItem.subject;
            }
        }
        lucide.createIcons();
    }

    async function fetchAIAnalysis(scheduleItem) {
        const aiContainer = document.getElementById('ai-points');
        if (!scheduleItem.docId) {
            aiContainer.innerHTML = `<li class="flex items-start gap-2 text-slate-500 text-sm"><div class="w-1.5 h-1.5 rounded-full bg-slate-400 mt-1.5 flex-shrink-0"></div><span>등록된 수업 지도안이 없습니다.</span></li>`;
            return;
        }

        aiContainer.innerHTML = `
            <li class="text-indigo-600 text-sm font-bold animate-pulse flex items-center gap-2 bg-indigo-50 p-3 rounded-lg border border-indigo-100">
                <i data-lucide="loader-2" class="w-4 h-4 animate-spin text-indigo-500"></i>
                <span>Gemini AI가 지도안을 분석 중입니다...</span>
            </li>`;
        lucide.createIcons();

        try {
            const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=analyze&docId=${scheduleItem.docId}`);
            const data = await res.json();
            if (data.success) {
                let pointsHtml = data.points.map(p => `
                    <li class="flex items-start gap-2 mb-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-blue-500 mt-1.5 flex-shrink-0"></div>
                        <span class="font-medium text-slate-700 leading-snug">${p}</span>
                    </li>`).join('');
                
                pointsHtml += `
                    <li class="mt-3 pt-2 border-t border-blue-200/50 flex items-center justify-end gap-1">
                        <i data-lucide="sparkles" class="w-3 h-3 text-slate-400"></i>
                        <span class="text-[10px] text-slate-400 font-medium tracking-wide">Gemini AI가 지도안을 분석하여 자동 생성한 결과입니다.</span>
                    </li>`;
                    
                aiContainer.innerHTML = pointsHtml;
                lucide.createIcons();
            } else { aiContainer.innerHTML = `<li class="text-red-500 text-xs italic"><i data-lucide="alert-circle" class="w-3 h-3 inline"></i> 분석 오류: ${data.message || '알 수 없는 서버 오류'}</li>`; lucide.createIcons(); }
        } catch (e) { aiContainer.innerHTML = `<li class="text-red-500 text-xs"><i data-lucide="wifi-off" class="w-3 h-3 inline"></i> 통신 실패: 구글 서버 응답 없음</li>`; lucide.createIcons(); }
    }

    function showScheduleModal() {
        const listDiv = document.getElementById('schedule-list'); listDiv.innerHTML = '';
        currentScheduleData.forEach((item) => {
            const dateBadge = item.date ? `<span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded mr-2">${item.date}</span>` : '';
            const aiBadge = (item.docId && String(item.docId).trim() !== "") ? `<span class="bg-purple-50 text-purple-600 px-2 py-0.5 rounded mr-2 text-[10px] font-bold border border-purple-100"><i data-lucide="sparkles" class="w-3 h-3 inline pb-0.5"></i> AI 수업분석</span>` : '';
            
            listDiv.innerHTML += `
                <div class="relative pl-6">
                    <div class="absolute -left-3.5 top-1 w-7 h-7 rounded-full bg-white border-2 border-slate-200 flex items-center justify-center">
                        <div class="w-2.5 h-2.5 rounded-full bg-blue-400"></div>
                    </div>
                    <div class="bg-slate-50 border border-slate-100 p-3 rounded-xl shadow-sm mb-4">
                        <span class="text-xs font-bold text-slate-500 mb-1 flex items-center">${dateBadge}${aiBadge}${item.time}</span>
                        <div class="flex items-center gap-2 mb-1"><strong class="text-sm text-slate-800">${item.subject}</strong></div>
                        <p class="text-xs text-slate-500 flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> ${item.loc}</p>
                    </div>
                </div>`;
        });
        lucide.createIcons(); openModal('schedule-modal');
    }

    function showMapModal() { 
        document.getElementById('map-current-loc').innerText = '📍 ' + (window.currentLocationName || '대기');
        document.getElementById('map-next-loc').innerText = '🚩 ' + (window.nextLocationName || '없음');
        openModal('map-modal'); 
    }
    
    function showMeetingModal() { window.open('https://padlet.com', '_blank'); }
    function openModal(id) { 
        const m = document.getElementById(id); const c = document.getElementById(id + '-content');
        m.classList.remove('hidden'); 
        setTimeout(() => { if(id==='schedule-modal') c.classList.remove('translate-y-full'); else c.classList.replace('scale-95', 'scale-100'); }, 10);
    }
    function closeModal(id) {
        const m = document.getElementById(id); const c = document.getElementById(id + '-content');
        if(id==='schedule-modal') c.classList.add('translate-y-full'); else c.classList.replace('scale-100', 'scale-95');
        setTimeout(() => m.classList.add('hidden'), 300);
    }
</script>
</body>
</html>
